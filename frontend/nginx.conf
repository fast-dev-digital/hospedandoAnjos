# SPA fallback: qualquer rota (ex.: /cancelar, /obrigado) cai no index.html,
# senão o servidor responde 404/home e o React Router nunca roda — era a causa
# do "recarrega e volta pra home" ao clicar no link de cancelamento.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # assets com hash no nome -> cache longo
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # todas as outras rotas -> index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
